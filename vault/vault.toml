# Credential injection configuration for vault service
# See README.md for documentation

[credentials."api.stripe.com"]
type = "bearer"
token = { provider = "env", name = "STRIPE_API_KEY" }

[credentials."api.cloudflare.com"]
type = "bearer"
token = { provider = "env", name = "CF_API_TOKEN" }

[credentials."api.machines.dev"]
type = "bearer"
token = { provider = "env", name = "FLY_API_TOKEN" }

[credentials."boots.fly.dev"]
type = "bearer"
token = { provider = "env", name = "BOOTS_TOKEN" }

[credentials."s3.us-east-1.amazonaws.com"]
type = "sigv4"
region = "us-east-1"
service = "s3"
access_key_id = { provider = "env", name = "AWS_ACCESS_KEY_ID" }
secret_access_key = { provider = "env", name = "AWS_SECRET_ACCESS_KEY" }

[credentials."7c30de076e6720bfa818e34d382d8f38.r2.cloudflarestorage.com"]
type = "sigv4"
region = "auto"
service = "s3"
access_key_id = { provider = "env", name = "R2_ACCESS_KEY_ID" }
secret_access_key = { provider = "env", name = "R2_SECRET_ACCESS_KEY" }

[credentials."auth.system3.md"]
type = "pocketbase"
url = "https://auth.system3.md"
collection = "bots"
email = { provider = "env", name = "PB_EMAIL" }
password = { provider = "env", name = "PB_PASSWORD" }
