services:
  vault:
    build: ./vault
    ports:
      - "8080:8080"
      - "2222:2222"
    environment:
      # Env var fallback (used when vault.yaml is not configured)
      - MACAROON_SIGNING_KEY=${MACAROON_SIGNING_KEY}
      - MACAROON_ENCRYPTION_KEY=${MACAROON_ENCRYPTION_KEY}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - FLY_API_TOKEN=${FLY_API_TOKEN}
      - BOOTS_TOKEN=${BOOTS_TOKEN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - PB_EMAIL=${PB_EMAIL}
      - PB_PASSWORD=${PB_PASSWORD}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - WEBAUTHN_RP_ORIGIN=${WEBAUTHN_RP_ORIGIN:-http://localhost:8080}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-Agent Credentials}
    volumes:
      - vault-data:/data
      - ./generated/vault.yaml:/app/vault.yaml:ro
    networks:
      - agent-creds

volumes:
  vault-data:

networks:
  agent-creds:
